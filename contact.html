<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact | LIKO Construction</title>
<meta name="description" content="Contact LIKO Construction in Cuddalore, Tamilnadu. Call +91 94888 88264 or WhatsApp for a free consultation.">
<link rel="icon" href="images/favicon.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css"></head><body>
<div id="site-header"></div>
<section class="hero" style="padding:60px 0"><div class="container"><h1>Get in Touch</h1><p class="lead">Tell us about your project. We'll respond within 24 hours.</p></div></section>
<section class="section"><div class="container"><div class="row g-4">
<div class="col-lg-5"><div class="feature-card h-100" id="cinfo"></div></div>
<div class="col-lg-7"><div class="feature-card h-100">
<h5 class="mb-3">Send a message</h5>
<form id="cform" class="row g-2">
<div class="col-md-6"><input required class="form-control" name="name" placeholder="Your Name"></div>
<div class="col-md-6"><input required class="form-control" name="phone" placeholder="Phone"></div>
<div class="col-12"><input class="form-control" name="email" type="email" placeholder="Email (optional)"></div>
<div class="col-12"><textarea required class="form-control" name="msg" rows="4" placeholder="Tell us about your project..."></textarea></div>
<div class="col-12"><button class="btn btn-brand w-100"><i class="bi bi-send-fill"></i> Send Message</button></div>
</form>
<div id="cmsg" class="small mt-2"></div>
</div></div>
</div>
<div class="mt-4"><iframe id="cmap" style="width:100%;height:380px;border:0;border-radius:14px" loading="lazy"></iframe></div>
</div></section>
<div id="site-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>(async()=>{const s=await mountChrome('contact');
const contactPhones = [{raw:s.phoneRaw,label:s.phone}];
if(s.phone2Raw && s.phone2) contactPhones.push({raw:s.phone2Raw,label:s.phone2});
document.getElementById('cinfo').innerHTML=`<h5 class="mb-3">${s.company}</h5>
<p><i class="bi bi-geo-alt-fill text-gold"></i> ${s.address}</p>
${contactPhones.map(p=>`<p><i class="bi bi-telephone-fill text-gold"></i> <a href="tel:${p.raw}">${p.label}</a></p>`).join('')}
<p><i class="bi bi-whatsapp text-gold"></i> <a href="https://wa.me/${s.whatsapp}">Chat on WhatsApp</a></p>
<p><i class="bi bi-envelope-fill text-gold"></i> <a href="mailto:${s.email}">${s.email}</a></p>
<a class="btn btn-gold w-100 mt-3" href="${s.mapsLink}" target="_blank"><i class="bi bi-map"></i> Open in Google Maps</a>`;
document.getElementById('cmap').src=s.mapsEmbed;
document.getElementById('cform').addEventListener('submit',e=>{e.preventDefault();const fd=new FormData(e.target);
saveEstimateRequest({name:fd.get('name'),phone:fd.get('phone'),email:fd.get('email'),message:fd.get('msg'),mode:'contact'});
document.getElementById('cmsg').innerHTML='<span class="text-success">✓ Message sent! We will contact you shortly.</span>';e.target.reset();});
})();</script>
</body></html>
