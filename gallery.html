<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gallery | LIKO Construction</title>
<meta name="description" content="Exterior, interior and ongoing project photos by LIKO Construction.">
<link rel="icon" href="images/favicon.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css"></head><body>
<div id="site-header"></div>
<section class="hero" style="padding:60px 0"><div class="container"><h1>Gallery</h1><p class="lead">A glimpse of our work.</p></div></section>
<section class="section"><div class="container">
<ul class="nav nav-pills justify-content-center mb-4">
<li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#g-ext">Exterior</button></li>
<li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#g-int">Interior</button></li>
<li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#g-on">Ongoing</button></li>
</ul>
<div class="tab-content">
<div class="tab-pane fade show active" id="g-ext"><div class="row g-3" id="r-ext"></div></div>
<div class="tab-pane fade" id="g-int"><div class="row g-3" id="r-int"></div></div>
<div class="tab-pane fade" id="g-on"><div class="row g-3" id="r-on"></div></div>
</div>
</div></section>

<div class="modal fade" id="imgModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content bg-transparent border-0"><img id="modalImg" class="img-fluid rounded"></div></div></div>

<div id="site-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>(async()=>{const s=await mountChrome('gallery');
document.getElementById('r-ext').innerHTML=renderGalleryTiles(s.gallery.exterior);
document.getElementById('r-int').innerHTML=renderGalleryTiles(s.gallery.interior);
document.getElementById('r-on').innerHTML=renderGalleryTiles(s.gallery.ongoing);
})();</script>
</body></html>
